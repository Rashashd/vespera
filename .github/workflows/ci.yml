name: CI

on:
  # Run on pushes to master and on every PR. Feature-branch pushes don't each fire a separate
  # run (a PR already runs CI on every update), which avoids double-spending Actions minutes.
  push:
    branches: [master]
  pull_request:

jobs:
  # Secret scanning — blocks any secret from entering the repo (US2 / FR-003).
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action reads PR commits via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans past commits too
          lfs: true
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required since gitleaks-action v2 for pull_request events (auto-provided token).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # Lint, type-check, and test against the real stack with coverage gates (T044).
  test:
    runs-on: ubuntu-latest
    # Hard cap so a hung test can never sit until the 6h default; combined with the per-test
    # pytest timeout this fails fast and loud instead of stalling the queue.
    timeout-minutes: 45
    env:
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: root
    steps:
      - uses: actions/checkout@v4
        with:
          # lfs: false — ONNX files are pointer files here; tests that need the real
          # 110 MB model skip themselves via _real_onnx_present(). The eval job has
          # lfs: true and is the authoritative model-quality gate.
          lfs: false
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dependencies (dev + modelserver groups; exclude heavy training group)
        run: uv sync --group modelserver
      - name: Ruff lint (incl. ASYNC rules for FR-018)
        run: uv run ruff check app worker tests
      - name: Black format check
        run: uv run black --check app worker tests
      - name: Type-check (advisory)
        run: uv run mypy app worker || true
      - name: Start infra (Vault + Postgres + Redis)
        run: docker compose up -d --wait vault postgres redis
      - name: Write secrets into Vault (inline; the local helper script is untracked)
        run: |
          uv run python - <<'PY'
          import os
          import hvac

          client = hvac.Client(url=os.environ["VAULT_ADDR"], token=os.environ["VAULT_TOKEN"])
          client.secrets.kv.v2.create_or_update_secret(
              path="pantera/secrets",
              secret={
                  "database_url": "postgresql+asyncpg://pantera:pantera@localhost:5432/pantera",
                  "redis_url": "redis://localhost:6379/0",
                  "anthropic_api_key": "ci-test-key",
                  # spec 2: required at boot; signs JWTs in the auth integration tests.
                  "auth_jwt_secret": "ci-test-jwt-secret",
                  # spec 5: modelserver credential (modelserver boots from Vault or env var)
                  "modelserver_token": "ci-test-token",  # gitleaks:allow
              },
          )
          print("secrets written")
          PY
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Tests with coverage (80% overall gate)
        env:
          PANTERA_INTEGRATION: "1"
          # PYTHONPATH needed so test_eval_gate.py can import/subprocess eval/classifier/run_eval.py
          PYTHONPATH: "."
          # Integration tests read DB/Redis URLs from Vault, not the environment; we keep
          # DATABASE_URL/REDIS_URL OUT of env so Settings() defaults stay clean for unit tests.
        run: uv run pytest --cov=app --cov=worker --cov=modelserver --cov-report=term-missing

  # Eval gate — classifier macro-F1 must stay >= 0.80 (US5 / FR-013 / D10)
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync modelserver group only (lean; no torch/DB)
        run: uv sync --only-group modelserver --no-install-project
      - name: Run eval gate
        # MAX_EVAL_EXAMPLES caps inference at 500 samples — enough for a reliable F1
        # estimate while keeping the job under 5 min on a shared runner.
        env:
          MAX_EVAL_EXAMPLES: "500"
        run: PYTHONPATH=. uv run python eval/classifier/run_eval.py
      - name: Sync app deps for triage eval (no torch/training group)
        run: uv sync --no-group training
      - name: Triage golden-set eval gate (recall>=0.90, precision>=0.75, SC-003)
        run: PYTHONPATH=. uv run pytest tests/integration/test_triage_eval.py -v
      - name: Agent tool-selection eval gate (accuracy>=0.85, SC-002)
        run: PYTHONPATH=. uv run pytest tests/integration/test_agent_tool_selection.py -v
      - name: Report grounding eval gate (grounding>=0.90, SC-001/SC-010)
        run: PYTHONPATH=. uv run pytest tests/integration/test_report_grounding.py -v

  # Frontend build smoke test — fresh-clone npm ci + vite build must succeed (SC-009).
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Vite production build
        working-directory: frontend
        run: npm run build
      - name: Vitest unit tests
        working-directory: frontend
        run: npm test -- --run
