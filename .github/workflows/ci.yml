name: CI

on:
  push:
  pull_request:

jobs:
  # Secret scanning — blocks any secret from entering the repo (US2 / FR-003).
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action reads PR commits via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans past commits too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required since gitleaks-action v2 for pull_request events (auto-provided token).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # Lint, type-check, and test against the real stack with coverage gates (T044).
  test:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: root
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dependencies
        run: uv sync
      - name: Ruff lint (incl. ASYNC rules for FR-018)
        run: uv run ruff check app worker tests
      - name: Black format check
        run: uv run black --check app worker tests
      - name: Type-check (advisory)
        run: uv run mypy app worker || true
      - name: Start infra (Vault + Postgres + Redis)
        run: docker compose up -d --wait vault postgres redis
      - name: Write secrets into Vault (inline; the local helper script is untracked)
        run: |
          uv run python - <<'PY'
          import os
          import hvac

          client = hvac.Client(url=os.environ["VAULT_ADDR"], token=os.environ["VAULT_TOKEN"])
          client.secrets.kv.v2.create_or_update_secret(
              path="pantera/secrets",
              secret={
                  "database_url": "postgresql+asyncpg://pantera:pantera@localhost:5432/pantera",
                  "redis_url": "redis://localhost:6379/0",
                  "anthropic_api_key": "ci-test-key",
                  # spec 2: required at boot; signs JWTs in the auth integration tests.
                  "auth_jwt_secret": "ci-test-jwt-secret",
              },
          )
          print("secrets written")
          PY
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Tests with coverage (80% overall gate)
        env:
          PANTERA_INTEGRATION: "1"
          # Integration tests read DB/Redis URLs from Vault, not the environment; we keep
          # DATABASE_URL/REDIS_URL OUT of env so Settings() defaults stay clean for unit tests.
        run: uv run pytest --cov=app --cov=worker --cov-report=term-missing
