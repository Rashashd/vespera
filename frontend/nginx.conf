# Static host for the Pantera SPA. Replaces `serve` so the spec-10 security
# headers (CSP etc.) are actually applied to every response (`always`).
# NOTE: connect-src must list the real backend API origin per deployment.
server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Edge security headers (token-in-localStorage is justified only with CSP).
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
