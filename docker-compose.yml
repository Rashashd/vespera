# Pantera local stack — one command brings up API + worker + Vault + Postgres + Redis.
# Only VAULT_ADDR and VAULT_TOKEN are passed via environment; all real secrets live in Vault.
services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pantera
      POSTGRES_PASSWORD: pantera
      POSTGRES_DB: pantera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantera"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8000:8000"
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: arq worker.worker.WorkerSettings
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  modelserver:
    build:
      context: .
      dockerfile: modelserver/Dockerfile
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8001:8001"
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
