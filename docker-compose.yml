# Pantera local stack — one command brings up API + worker + Vault + Postgres + Redis.
# Only VAULT_ADDR and VAULT_TOKEN are passed via environment; all real secrets live in Vault.
services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pantera
      POSTGRES_PASSWORD: pantera
      POSTGRES_DB: pantera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Spec 12: create the least-priv pantera_app role on a fresh volume (runs once at init).
      - ./scripts/db/init-pantera-app-role.sql:/docker-entrypoint-initdb.d/10-pantera-app-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantera"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8000:8000"
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardrails:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: arq worker.worker.WorkerSettings
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardrails:
        condition: service_healthy

  modelserver:
    build:
      context: .
      dockerfile: modelserver/Dockerfile
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8001:8001"
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      # The lean image has no curl; use the bundled Python stdlib to probe /health (no auth).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  guardrails:
    build:
      context: .
      dockerfile: guardrails/Dockerfile
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8002:8002"
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      # The lean image has no curl; use the bundled Python stdlib to probe /health (no auth).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
